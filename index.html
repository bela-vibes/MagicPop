<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23FF4D00'/><text x='50%' y='54%' dominant-baseline='central' text-anchor='middle' fill='black' font-family='sans-serif' font-size='14' font-weight='900' letter-spacing='-0.5'>MP</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F9F7F2" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <title>Magic Pop | Creative Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'magic-black': '#000000',
              'magic-dark': '#000000',
              'off-white': '#F9F7F2',
              'magic-orange': '#FF4D00',
              'magic-blue': '#0038FF',
              'magic-pink': '#FFB7D5',
            },
            fontFamily: {
              archivo: ['Archivo Black', 'sans-serif'],
              editorial: ['Instrument Serif', 'serif'],
              inter: ['Inter', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out both',
            },
            aspectRatio: {
              '3/2': '3 / 2',
            }
          }
        }
      }
    </script>
    <style>
      /* LOCAL FONTS (GDPR COMPLIANT) - ONLY WOFF2 */
      @font-face {
        font-family: 'Archivo Black';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/archivo-black.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/inter-regular.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('/fonts/inter-500.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('/fonts/inter-700.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 900;
        font-display: swap;
        src: url('/fonts/inter-900.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Instrument Serif';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/instrument-serif-regular.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Instrument Serif';
        font-style: italic;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/instrument-serif-italic.woff2') format('woff2');
      }

      /* RESET */
      * {
        -webkit-tap-highlight-color: transparent !important;
        outline: none !important;
      }

      a, button, input, textarea, select {
        outline: none !important;
        box-shadow: none !important;
      }

      body {
        font-family: 'Inter', sans-serif;
        transition: background-color 0.5s ease, color 0.5s ease;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Dark Mode Transition */
      html.transitioning,
      html.transitioning *,
      html.transitioning *::before,
      html.transitioning *::after {
        transition:
          background-color 0.5s ease-in-out !important,
          color 0.5s ease-in-out !important,
          border-color 0.5s ease-in-out !important,
          fill 0.5s ease-in-out !important,
          stroke 0.5s ease-in-out !important;
      }

      /* Transitions */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideInFromBottom { from { transform: translateY(20px); } to { transform: translateY(0); } }
      .animate-in { animation: fadeIn 0.5s ease-out both, slideInFromBottom 0.5s ease-out both; }

      section[id] { scroll-margin-top: 100px; }

      /* Hide scrollbar */
      ::-webkit-scrollbar { display: none; }
      html { -ms-overflow-style: none; scrollbar-width: none; }

      .hyphens-auto {
        -webkit-hyphens: auto;
        -ms-hyphens: auto;
        hyphens: auto;
      }

      /* Image Protection */
      img {
        -webkit-user-drag: none;
        -khtml-user-drag: none;
        -moz-user-drag: none;
        -o-user-drag: none;
        user-drag: none;
        user-select: none;
        -webkit-user-select: none;
        -ms-user-select: none;
      }
    </style>
  </head>
  <body class="bg-off-white text-magic-black dark:bg-magic-dark dark:text-off-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      document.addEventListener('contextmenu', function(e) {
        if (e.target.tagName === 'IMG') e.preventDefault();
      }, false);
    </script>
  </body>
</html>
